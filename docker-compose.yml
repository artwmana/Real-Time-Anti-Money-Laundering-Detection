services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aml
      POSTGRES_PASSWORD: aml
      POSTGRES_DB: aml
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml -d aml"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: aml
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transactions_raw --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aml_predictions --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aml_alerts --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic aml_dead_letter --partitions 1 --replication-factor 1

  mlflow:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --backend-store-uri postgresql://aml:aml@postgres:5432/aml
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      AML_STORAGE_BACKEND: postgres
      AML_POSTGRES_DSN: postgresql://aml:aml@postgres:5432/aml

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    command: aml-serve
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./runtime:/app/runtime
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      AML_STORAGE_BACKEND: postgres
      AML_POSTGRES_DSN: postgresql://aml:aml@postgres:5432/aml
      AML_CLICKHOUSE_HOST: clickhouse
      AML_CLICKHOUSE_PORT: 8123
      AML_CLICKHOUSE_DATABASE: aml
      AML_REDIS_URL: redis://redis:6379/0
      AML_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AML_API_BASE_URL: http://api:8000
      AML_ENABLE_CLICKHOUSE: "1"
      AML_ENABLE_KAFKA: "1"
      AML_ENABLE_REDIS: "1"
      AML_ENABLE_MLFLOW: "1"
      MLFLOW_TRACKING_URI: http://mlflow:5000

  kafka-worker:
    build: .
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: aml-kafka-worker
    volumes:
      - ./models:/app/models
      - ./runtime:/app/runtime
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      AML_STORAGE_BACKEND: postgres
      AML_POSTGRES_DSN: postgresql://aml:aml@postgres:5432/aml
      AML_CLICKHOUSE_HOST: clickhouse
      AML_CLICKHOUSE_PORT: 8123
      AML_CLICKHOUSE_DATABASE: aml
      AML_REDIS_URL: redis://redis:6379/0
      AML_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AML_API_BASE_URL: http://api:8000
      AML_ENABLE_CLICKHOUSE: "1"
      AML_ENABLE_KAFKA: "1"
      AML_ENABLE_REDIS: "1"
      AML_ENABLE_MLFLOW: "0"

  spark-master:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
    ports:
      - "8081:8081"

  spark-stream:
    build: .
    depends_on:
      spark-master:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: aml-spark-stream
    volumes:
      - ./models:/app/models
      - ./runtime:/app/runtime
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      AML_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AML_API_BASE_URL: http://api:8000
      AML_STORAGE_BACKEND: postgres
      AML_POSTGRES_DSN: postgresql://aml:aml@postgres:5432/aml
      SPARK_EXTRA_PACKAGES: org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.2
      SPARK_MASTER: spark://spark-master:7077

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  kafka_data:
